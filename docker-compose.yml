services:
  db:
    image: postgres:17-alpine
    container_name: org_structure_db
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d org_structure" ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: org_structure_app
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
